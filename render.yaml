services:
  - type: web
    name: my-ai-gateway
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 1994
      - key: LOG_LEVEL
        value: info
      - key: SQL_DSN
        value: sqlite:///data/ai-gateway.db
      - key: AI_GATEWAY_SEED_ON_BOOT
        value: 1
      - key: AI_GATEWAY_BASIC_AUTH
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: API_KEY_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
