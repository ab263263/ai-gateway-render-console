name: Render Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          TARGET_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "RENDER_KEEPALIVE_URL is not set"
            exit 1
          fi
          curl -fsSL --max-time 20 "$TARGET_URL" >/dev/null
