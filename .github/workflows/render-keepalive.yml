name: Render Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (RENDER_KEEPALIVE_URL or default)
        env:
          TARGET_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          URL="${TARGET_URL:-https://my-ai-gateway-p6on.onrender.com/health}"
          echo "Pinging $URL"
          curl -fsSL --max-time 20 "$URL" >/dev/null
          echo "Keepalive ping done"
