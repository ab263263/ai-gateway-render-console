name: Build Render Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install backend deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build Rust backend
        run: cargo build --release

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Validate Dockerfile references
        run: |
          test -f Dockerfile
          test -f docker-entrypoint.sh
          test -f scripts/seed-render-data.js
          echo "build validation passed"
