name: Build Render Deployment

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
      - 'frontend/dist/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Build Rust backend
        run: cargo build --release

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Commit binary to repo for Render
        run: |
          mkdir -p dist
          cp target/release/ai-gateway dist/ai-gateway
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ai-gateway -f
          git diff --cached --quiet || git commit -m "chore: update pre-built binary [skip ci]"
          git push
